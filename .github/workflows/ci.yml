name: CI

on:
  pull_request:
  push:
    branches:
      - master
    paths-ignore:
      # 纯文档变更不需要跑整套 Rust CI（参考 AGENTS.md 常用验证）
      # 注意：pull_request 不加 paths-ignore，否则纯文档 PR 缺少 CI 状态，无法合并
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "LICENSE"
      - "dist/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect script changes
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      windows: ${{ steps.filter.outputs.windows }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect affected script checks
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          changed_files="$(mktemp)"
          trap 'rm -f "${changed_files}"' EXIT

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            printf '%s\n' '.github/workflows/ci.yml' > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git diff --name-only "origin/${BASE_REF}...HEAD" > "${changed_files}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${BEFORE_SHA}...HEAD" > "${changed_files}"
          else
            git ls-files > "${changed_files}"
          fi

          shell=false
          windows=false
          if grep -Eq '(^|/)scripts/.*\.sh$|^\.github/workflows/ci\.yml$' "${changed_files}"; then
            shell=true
          fi
          if grep -Eq '(^|/)scripts/.*\.(ps1|cmd)$|^scripts/(botctl|test-windows-botctl)\.sh$|^scripts/tests/windows-smoke\.cs$|^\.github/workflows/ci\.yml$' "${changed_files}"; then
            windows=true
          fi
          echo "shell=${shell}" >> "${GITHUB_OUTPUT}"
          echo "windows=${windows}" >> "${GITHUB_OUTPUT}"

  shell:
    name: Shell checks
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run installer regression tests
        run: |
          bash scripts/test-qbot-install.sh
          bash scripts/test-qbot-config.sh
          bash scripts/test-package-release.sh
          bash scripts/test-prepare-project-docs-kb.sh
          bash scripts/test-botctl-guidance.sh

      - name: Check shell syntax
        run: bash -n scripts/*.sh

  windows-botctl:
    name: Windows botctl smoke test
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check PowerShell syntax
        shell: powershell
        run: |
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($_.Name): $($errors -join '; ')"
            }
          }

      - name: Build native Windows smoke executable
        shell: powershell
        run: |
          Add-Type -TypeDefinition (Get-Content scripts/tests/windows-smoke.cs -Raw) -OutputType ConsoleApplication -OutputAssembly "$env:RUNNER_TEMP\qq-maid-bot.exe"

      - name: Exercise start, status, stop, and forced stop
        shell: bash
        run: bash scripts/test-windows-botctl.sh "$RUNNER_TEMP/qq-maid-bot.exe"

      - name: Exercise native PowerShell controller
        shell: powershell
        run: .\scripts\test-windows-powershell-botctl.ps1 "$env:RUNNER_TEMP\qq-maid-bot.exe"

      - name: Exercise native PowerShell installer
        shell: powershell
        run: .\scripts\test-windows-qbot.ps1

  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # PR 时需要历史记录做 diff

      - name: Check if Rust files changed (PR only)
        id: rust_changes
        if: github.event_name == 'pull_request'
        run: |
          # Shell 脚本由 shell / windows-botctl job 独立验证，不应触发耗时的 Rust 全量检查。
          if git diff --name-only "origin/${{ github.base_ref }}..." | grep -qE '(\.rs$|^Cargo\.(toml|lock)$|^rust-toolchain|^runtime/|^Makefile)'; then
            echo "has_rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust=false" >> "$GITHUB_OUTPUT"
            echo "纯文档变更，跳过 Rust 编译测试步骤"
          fi

      - name: Install Rust stable
        if: steps.rust_changes.outputs.has_rust != 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        if: steps.rust_changes.outputs.has_rust != 'false'
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: steps.rust_changes.outputs.has_rust != 'false'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        if: steps.rust_changes.outputs.has_rust != 'false'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        if: steps.rust_changes.outputs.has_rust != 'false'
        run: cargo test --workspace --all-features

      - name: Build release binaries
        if: steps.rust_changes.outputs.has_rust != 'false'
        run: cargo build --workspace --release --all-features
