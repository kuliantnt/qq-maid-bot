name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Manual package version name"
        required: false
        default: "dev"

permissions:
  contents: read

jobs:
  # ==========================================================================
  # preflight：在矩阵构建前完成所有 tag 合法性检查
  #   - workflow_dispatch：直接放行构建，但不发布
  #   - tag push：校验 master 祖先 + 两个版本 tag 之间存在非纯文档变更
  # ==========================================================================
  preflight:
    name: Preflight check
    runs-on: ubuntu-latest
    outputs:
      allow_build: ${{ steps.check.outputs.allow_build }}
      allow_publish: ${{ steps.check.outputs.allow_publish }}
      tag_commit: ${{ steps.check.outputs.tag_commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # 需要完整历史以解析 tag 和 diff

      - name: Preflight checks
        id: check
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 默认拒绝，安全优先
          allow_build="false"
          allow_publish="false"

          # ---- workflow_dispatch：手动打包，不做 tag 校验 ----
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            allow_build="true"
            allow_publish="false"
            echo "allow_build=${allow_build}" >> "$GITHUB_OUTPUT"
            echo "allow_publish=${allow_publish}" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — skipping tag preflight checks"
            exit 0
          fi

          # ================================================================
          # 以下是 tag push 的校验逻辑
          # ================================================================

          # 1. 安全解析 tag 为 commit（兼容轻量 tag 和 annotated tag）
          tag_commit=$(git rev-list -n 1 "${TAG_NAME}")
          echo "Tag ${TAG_NAME} resolves to commit ${tag_commit}"
          echo "tag_commit=${tag_commit}" >> "$GITHUB_OUTPUT"

          # 2. 校验 tag commit 属于 master 祖先
          #    使用完整 refspec 强制更新 origin/master，避免 --depth=1 等浅拉取
          #    截断历史，导致 git merge-base --is-ancestor 误判合法祖先 tag
          git fetch --no-tags origin '+refs/heads/master:refs/remotes/origin/master'
          if ! git merge-base --is-ancestor "${tag_commit}" origin/master; then
            echo "::error::Tag ${TAG_NAME} 不在 master 分支上，拒绝构建和发布"
            echo "::error::请确认 tag 打在 master 上：git checkout master && git tag ${TAG_NAME}"
            exit 1
          fi
          echo "Tag ${TAG_NAME} is on master ✓"

          # 3. 找到当前 tag 之前、且已经位于当前 master 历史中的上一版 tag。
          #    发布提交通常只修改 CHANGELOG.md；不能只比较它与第一父提交，
          #    否则会把上一版以来已经合并的代码误判为纯文档发布。
          previous_tag=$(git tag --merged "${tag_commit}" --list 'v*' --sort=-version:refname \
            | awk -v current="${TAG_NAME}" '$0 != current { print; exit }')
          if [[ -n "${previous_tag}" ]]; then
            compare_base="${previous_tag}"
            echo "Previous release tag: ${previous_tag}"
          else
            compare_base=$(git rev-parse "${tag_commit}^1" 2>/dev/null) || true
            if [[ -z "${compare_base}" ]]; then
              echo "::error::无法获取上一版 tag 或 tag commit 的父提交，拒绝构建"
              exit 1
            fi
            echo "No previous release tag; using parent commit: ${compare_base}"
          fi

          # 4. 比较上一版 tag（或首次发布的父提交）到当前 tag 的完整变更。
          changed_files=$(git diff --name-only "${compare_base}" "${tag_commit}")
          if [[ -z "${changed_files}" ]]; then
            echo "::error::tag commit 相对比较基线无变更文件，拒绝构建"
            exit 1
          fi
          echo "Changed files:"
          echo "${changed_files}"

          # 5. 判断是否存在非文档/非忽略路径的变更
          #    忽略列表：docs/、.md、ISSUE_TEMPLATE、PULL_REQUEST_TEMPLATE、LICENSE、dist/
          ignore_pattern='^docs/|\.md$|^\.github/ISSUE_TEMPLATE/|^\.github/PULL_REQUEST_TEMPLATE\.md$|^LICENSE$|^dist/'
          has_code_changes=false

          while IFS= read -r file; do
            if ! echo "${file}" | grep -qE "${ignore_pattern}"; then
              has_code_changes=true
              echo "Non-doc change detected: ${file}"
              break
            fi
          done <<< "${changed_files}"

          if [[ "${has_code_changes}" == "true" ]]; then
            allow_build="true"
            allow_publish="true"
            echo "Valid release tag — allowing build and publish"
          else
            allow_build="false"
            allow_publish="false"
            echo "Pure doc tag — skipping build and release"
          fi

          echo "allow_build=${allow_build}" >> "$GITHUB_OUTPUT"
          echo "allow_publish=${allow_publish}" >> "$GITHUB_OUTPUT"

  # Docker 正式标签只晋级 master 已发布并由测试环境使用过的 commit 镜像。
  # 此 job 不执行 docker build；同一 manifest 同步到 GHCR 与 Docker Hub。
  promote-container:
    name: Promote tested container digest
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.preflight.outputs.allow_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    env:
      GHCR_REPOSITORY: ghcr.io/kuliantnt/qq-maid-bot
      DOCKERHUB_REPOSITORY: docker.io/kuliantnt/qq-maid-bot

    steps:
      - name: Verify test deployment workflow succeeded
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_COMMIT: ${{ needs.preflight.outputs.tag_commit }}
        run: |
          run_ids="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/container.yml/runs" \
            -f branch=master \
            -f event=push \
            -f status=completed \
            -f head_sha="${TAG_COMMIT}" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | .id')"
          deployed_run_id=""
          for run_id in ${run_ids}; do
            deploy_conclusion="$(gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" \
              --jq '.jobs[] | select(.name == "Deploy test environment") | .conclusion')"
            if [[ "${deploy_conclusion}" == "success" ]]; then
              deployed_run_id="${run_id}"
              break
            fi
          done
          [[ -n "${deployed_run_id}" ]] || {
            echo "::error::tag commit 没有成功的 test Environment 部署，拒绝晋级未部署验证的镜像"
            exit 1
          }
          echo "verified test deployment workflow run: ${deployed_run_id}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate Docker Hub credentials
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          for name in DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            [[ -n "${!name}" ]] || {
              echo "::error::缺少正式镜像发布 Secret: ${name}"
              exit 1
            }
          done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4

      - name: Promote existing commit manifest
        shell: bash
        env:
          TAG_COMMIT: ${{ needs.preflight.outputs.tag_commit }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          trap 'echo "::error::正式容器双渠道发布未完成；当前结果不能视为 GHCR 与 Docker Hub 均发布成功"' ERR
          if [[ ! "${TAG_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::容器正式晋级仅接受 vX.Y.Z 稳定版本 tag"
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          source="${GHCR_REPOSITORY}:sha-${TAG_COMMIT}"
          digest="$(crane digest "${source}")" || {
            echo "::error::commit 镜像不存在：${source}；tag 阶段不会重新构建"
            exit 1
          }

          for platform in linux/amd64 linux/arm64; do
            revision="$(crane config --platform "${platform}" "${GHCR_REPOSITORY}@${digest}" \
              | jq -r '.config.Labels["org.opencontainers.image.revision"] // ""')"
            [[ "${revision}" == "${TAG_COMMIT}" ]] || {
              echo "::error::${platform} 镜像 revision=${revision} 与 tag commit=${TAG_COMMIT} 不一致"
              exit 1
            }
          done

          # crane copy 直接复制已经部署验证的 commit manifest，不触发 Docker build。
          crane copy "${GHCR_REPOSITORY}@${digest}" "${DOCKERHUB_REPOSITORY}:${TAG_NAME}"
          dockerhub_digest="$(crane digest "${DOCKERHUB_REPOSITORY}:${TAG_NAME}")"
          [[ "${dockerhub_digest}" == "${digest}" ]] || {
            echo "::error::Docker Hub manifest digest=${dockerhub_digest} 与已测试 GHCR digest=${digest} 不一致"
            exit 1
          }

          for tag in "${TAG_NAME}" "${major}.${minor}" "${major}" latest; do
            crane tag "${GHCR_REPOSITORY}@${digest}" "${tag}"
            crane tag "${DOCKERHUB_REPOSITORY}@${dockerhub_digest}" "${tag}"
            ghcr_tag_digest="$(crane digest "${GHCR_REPOSITORY}:${tag}")"
            dockerhub_tag_digest="$(crane digest "${DOCKERHUB_REPOSITORY}:${tag}")"
            [[ "${ghcr_tag_digest}" == "${digest}" ]] || {
              echo "::error::GHCR 标签 ${tag} 的实际 manifest digest 不一致"
              exit 1
            }
            [[ "${dockerhub_tag_digest}" == "${digest}" ]] || {
              echo "::error::Docker Hub 标签 ${tag} 的实际 manifest digest 不一致"
              exit 1
            }
          done

          {
            printf '%s\n' "GHCR manifest: \`${GHCR_REPOSITORY}@${digest}\`"
            printf '%s\n' "Docker Hub manifest: \`${DOCKERHUB_REPOSITORY}@${dockerhub_digest}\`"
            printf '%s\n' \
              "tags: \`${TAG_NAME}\`, \`${major}.${minor}\`, \`${major}\`, \`latest\`"
            printf '%s\n' "双渠道正式标签已逐项校验为同一实际 manifest digest。"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ==========================================================================
  # build-package：4 平台矩阵构建
  #   每个 Rust target 都使用对应架构的原生 GitHub-hosted runner，不做交叉编译
  #   仅当 preflight 输出 allow_build == 'true' 时执行
  # ==========================================================================
  build-package:
    name: Build ${{ matrix.target_triple }}
    needs: preflight
    if: needs.preflight.outputs.allow_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_triple: linux-x86_64
            build_target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_format: tar.gz
            payload_profile: unix

          - target_triple: linux-aarch64
            build_target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_format: tar.gz
            payload_profile: unix

          - target_triple: macos-aarch64
            build_target: aarch64-apple-darwin
            os: macos-latest
            archive_format: tar.gz
            payload_profile: unix

          - target_triple: windows-x86_64
            build_target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_format: zip
            payload_profile: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # ---- Windows 打包依赖（Git Bash 默认不含 zip） ----
      - name: Install zip (Windows)
        if: runner.os == 'Windows'
        run: choco install zip -y --no-progress

      # ---- 原生 runner 校验 ----
      - name: Verify native Rust target
        shell: bash
        run: |
          host="$(rustc -vV | awk '/^host:/ {print $2}')"
          echo "Rust host target: ${host}"
          if [[ "${host}" != "${{ matrix.build_target }}" ]]; then
            echo "::error::Runner host ${host} does not match expected native target ${{ matrix.build_target }}"
            exit 1
          fi

      # ---- Cargo 缓存 ----
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.build_target }}

      # ---- 构建 ----
      - name: Build release binaries
        shell: bash
        run: cargo build --workspace --release --all-features

      # ---- 版本号 ----
      - name: Select package version
        id: package
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      # ---- 打包 ----
      - name: Build runtime package
        shell: bash
        run: |
          export TARGET_TRIPLE="${{ matrix.target_triple }}"
          export ARCHIVE_FORMAT="${{ matrix.archive_format }}"
          export PAYLOAD_PROFILE="${{ matrix.payload_profile }}"
          # CI 发布矩阵只做原生构建，打包脚本从 target/release/ 读取当前 runner 的产物。
          bash scripts/package-release.sh "${{ steps.package.outputs.version }}"

      # ---- 上传 artifact ----
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: qq-maid-bot-${{ steps.package.outputs.version }}-${{ matrix.target_triple }}
          path: |
            dist/qq-maid-bot-${{ steps.package.outputs.version }}-${{ matrix.target_triple }}.${{ matrix.archive_format }}
            dist/qq-maid-bot-${{ steps.package.outputs.version }}-${{ matrix.target_triple }}.${{ matrix.archive_format }}.sha256
          if-no-files-found: error

  # ==========================================================================
  # publish-release：创建 GitHub Release
  #   仅当是 tag push 且 preflight 允许发布时执行
  #   needs build-package 保证 artifact 准备就绪；若 build-package 被跳过
  #   （纯文档 tag），publish-release 也会被自动跳过
  # ==========================================================================
  publish-release:
    name: Publish GitHub Release
    needs: [preflight, build-package, promote-container]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.preflight.outputs.allow_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/qq-maid-bot-${{ github.ref_name }}-*.tar.gz
            dist/qq-maid-bot-${{ github.ref_name }}-*.tar.gz.sha256
            dist/qq-maid-bot-${{ github.ref_name }}-*.zip
            dist/qq-maid-bot-${{ github.ref_name }}-*.zip.sha256
