version = 1

# 复制本文件为 context_modules.toml 后，
# 需要把 context/*.example.md 一并复制为同名 .md 私有文件，再让 file 指向这些 .md。
[limits]
max_dynamic_modules = 2
max_total_chars = 6000

[[modules]]
id = "deploy"
file = "context/deploy.md"
keywords = ["部署", "上线", "回滚"]
priority = 90

[[modules]]
id = "ops"
file = "context/ops.md"
keywords = ["日志", "告警", "巡检"]
priority = 70
